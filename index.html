<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW R1100S Dashboard</title>
    <style>
        :root {
            --bg-color: #000000;       /* Sfondo nero assoluto anti-riflesso */
            --card-bg: #000000;        /* Card nere per non creare stacchi luminosi */
            --text-main: #CCFF00;      /* Giallo fluo per i dati principali (giri, velocità, marcia) */
            --text-muted: #FFFFFF;     /* Bianco puro per le etichette e i dati secondari */
            --border-color: #FFFFFF;   /* Bordi bianchi sottili per separare i blocchi */
            --accent-color: #CCFF00;   /* Dettagli in giallo fluo */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 10px;
        }

        .dashboard-container {
            width: 100%;
            max-width: 800px;
            background-color: var(--bg-color);
            border: 3px solid var(--accent-color);
            border-radius: 16px;
            padding: 20px;
            position: relative;
            box-shadow: none;
        }

        #status-container {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .connected { color: #00FF00; }    /* Verde per stato OK */
        .disconnected { color: #FF0000; } /* Rosso per allarme/disconnesso */

        h1 {
            font-size: 1.6rem;
            color: var(--accent-color);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
        }

        .page {
            display: none;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .page.active {
            display: grid;
        }

        .card {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 140px;
        }

        .card-full {
            grid-column: span 2;
            min-height: 160px;
            border-color: var(--accent-color);
        }

        .card-label {
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .card-value {
            font-size: 3.8rem;
            font-weight: 900;
            font-variant-numeric: tabular-nums;
            color: var(--text-main);
            line-height: 1;
        }

        .gear-value {
            font-size: 6.5rem;
            color: var(--text-main);
        }

        .rpm-value {
            font-size: 4.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div id="status-container">
            <span id="status" class="disconnected">DISCONNESSO</span>
        </div>

        <h1>BMW R1100S Dashboard</h1>

        <div id="page-0" class="page active">
            <div class="card card-full">
                <div class="card-label">Giri Motore (RPM)</div>
                <div id="rpm" class="card-value rpm-value">0</div>
            </div>
            <div class="card">
                <div class="card-label">Velocità (KM/H)</div>
                <div id="spd" class="card-value">0</div>
            </div>
            <div class="card">
                <div class="card-label">Marcia</div>
                <div id="gear" class="card-value gear-value">-</div>
            </div>
        </div>

        <div id="page-1" class="page">
            <div class="card">
                <div class="card-label">Temp. Motore (CLT)</div>
                <div id="clt" class="card-value">0.0°C</div>
            </div>
            <div class="card">
                <div class="card-label">Temp. Aria (IAT)</div>
                <div id="iat" class="card-value">0.0°C</div>
            </div>
            <div class="card">
                <div class="card-label">Tensione Batteria</div>
                <div id="bat" class="card-value">0.00V</div>
            </div>
            <div class="card">
                <div class="card-label">Sonda Lambda</div>
                <div id="lmd" class="card-value">0</div>
            </div>
            <div class="card">
                <div class="card-label">Trip</div>
                <div id="trip" class="card-value">0.0</div>
            </div>
            <div class="card">
                <div class="card-label">Odo Totale</div>
                <div id="tot" class="card-value">0.0</div>
            </div>
        </div>
    </div>

    <script>
        let ws;
        const statusEl = document.getElementById('status');
        
        const elements = {
            rpm: document.getElementById('rpm'),
            spd: document.getElementById('spd'),
            gear: document.getElementById('gear'),
            clt: document.getElementById('clt'),
            iat: document.getElementById('iat'),
            bat: document.getElementById('bat'),
            lmd: document.getElementById('lmd'),
            trip: document.getElementById('trip'),
            tot: document.getElementById('tot')
        };

        const pages = [
            document.getElementById('page-0'),
            document.getElementById('page-1')
        ];

        function connect() {
            // Connessione WebSocket all'IP dell'ESP32 locale
            ws = new WebSocket(`ws://${window.location.hostname}/ws`);

            ws.onopen = () => {
                statusEl.textContent = "CONNESSO";
                statusEl.className = "connected";
            };

            ws.onclose = () => {
                statusEl.textContent = "DISCONNESSO";
                statusEl.className = "disconnected";
                clearData();
                setTimeout(connect, 2000); // Riconnessione automatica
            };

            ws.onerror = (err) => {
                console.error("Errore WebSocket:", err);
                ws.close();
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    
                    // Aggiornamento campi con fallbacks di sicurezza
                    elements.rpm.textContent = data.rpm ?? 0;
                    elements.spd.textContent = data.spd ?? 0;
                    elements.gear.textContent = (data.gear === 0 || !data.gear) ? "N" : data.gear;
                    elements.clt.textContent = (data.clt ?? 0.0) + "°C";
                    elements.iat.textContent = (data.iat ?? 0.0) + "°C";
                    elements.bat.textContent = (data.bat ?? 0.00) + "V";
                    elements.lmd.textContent = data.lmd ?? 0;
                    elements.trip.textContent = data.trip ?? 0.0;
                    elements.tot.textContent = data.tot ?? 0.0;

                    // Cambio pagina gestito dal server (parametro "page" nel JSON)
                    if (typeof data.page !== 'undefined') {
                        switchPage(data.page);
                    }
                } catch (e) {
                    console.error("Errore nel parsing dei dati:", e);
                }
            };
        }

        function switchPage(pageNum) {
            pages.forEach((page, index) => {
                if (index === pageNum) {
                    page.classList.add('active');
                } else {
                    page.classList.remove('active');
                }
            });
        }

        function clearData() {
            elements.rpm.textContent = "0";
            elements.spd.textContent = "0";
            elements.gear.textContent = "-";
            elements.clt.textContent = "0.0°C";
            elements.iat.textContent = "0.0°C";
            elements.bat.textContent = "0.00V";
            elements.lmd.textContent = "0";
            elements.trip.textContent = "0.0";
            elements.tot.textContent = "0.0";
        }

        // Avvio connessione al caricamento della pagina
        window.addEventListener('DOMContentLoaded', connect);
    </script>
</body>
</html>
