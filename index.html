<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111111">
<link rel="manifest" href="Manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<title>BMW R1100S</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#111;overflow:hidden;}

/* ── PAGES ── */
.page{width:100%;height:100%;display:none;position:fixed;top:0;left:0;}
.page.active{display:block;}

/* ── PAGE 0: DASHBOARD ── */
#page0{background:#111;}
.frame{position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;overflow:hidden;}
canvas{position:fixed;top:0;left:0;display:block;cursor:pointer;}

/* ── PAGE 1: MAP LAYOUT ──
   ┌──────────────┬────────┐
   │              │ NAVBOX │
   │     MAP      │ square │
   │              ├────────┤  <- data bar bottom
   └──────────────┴────────┘
   Data bar spans full width at bottom
   Navbox: right edge = screen right, side = data bar height subtracted
*/
#page1{
    position:relative;
    background:#0a0a0a;
}

/* Map fills entire page, data bar and navbox sit on top */
#map{
    position:absolute;
    top:0;left:0;
    /* right edge stops before navbox */
    right:var(--nav-size, 150px);
    /* bottom stops above data bar */
    bottom:var(--bar-h, 66px);
}

/* ── NAV BOX ── square, right side, above data bar ── */
#navBox{
    position:absolute;
    top:0;
    right:0;
    width:var(--nav-size, 150px);
    /* height = width = nav-size, set by JS */
    background:#111;
    border-left:1px solid #222;
    border-bottom:2px solid #333;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:6px;padding:10px;
    overflow:hidden;
}
#navBox.active{border-bottom-color:#ffa500;}
#navBox.offroute{border-bottom-color:#f87171;}
#navArrow{
    font-size:64px;line-height:1;color:#333;
    display:inline-block;transition:transform 0.3s;
}
#navBox.active   #navArrow{color:#ffa500;}
#navBox.offroute #navArrow{color:#f87171;}
#navText{
    font-family:Arial;font-size:9px;font-weight:600;
    color:#333;text-align:center;width:100%;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    letter-spacing:0.5px;
}
#navBox.active   #navText{color:#ccc;}
#navBox.offroute #navText{color:#f87171;}
#navDist{
    font-family:Arial;font-size:15px;font-weight:700;
    color:#333;letter-spacing:1px;
}
#navBox.active   #navDist{color:#ffa500;}
#navBox.offroute #navDist{color:#f87171;font-size:10px;}

/* ── DATA BAR: full width at bottom ── */
#mapBar{
    position:absolute;
    bottom:0;left:0;right:0;
    height:var(--bar-h, 66px);
    background:rgba(0,0,0,0.95);
    border-top:1px solid #222;
    display:flex;align-items:stretch;
}
.mdata{
    flex:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    padding:4px;border-right:1px solid #1a1a1a;
}
.mdata:last-child{border-right:none;}
.mdata-val{font-family:Arial;font-weight:700;color:#fff;line-height:1;}
.mdata-lbl{font-family:Arial;font-size:7px;color:#555;letter-spacing:2px;margin-top:2px;}
.mdata-val.big{font-size:26px;color:#ffa500;}
.mdata-val.med{font-size:18px;}
.mdata-val.sml{font-size:13px;color:#aaa;}

/* ── MAP CONTROLS ── bottom-left, above data bar ── */
#mapControls{
    position:absolute;
    left:10px;
    bottom:calc(var(--bar-h, 66px) + 10px);
    display:flex;flex-direction:column;gap:6px;
    z-index:600;
}
.mctrl{
    width:44px;height:44px;
    background:rgba(10,10,10,0.92);
    border:1px solid #333;border-radius:6px;
    color:#aaa;font-size:10px;font-weight:700;
    letter-spacing:0.5px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:all 0.2s;font-family:Arial;
    box-shadow:0 2px 8px rgba(0,0,0,0.5);
}
.mctrl:hover{border-color:#ffa500;color:#ffa500;}
.mctrl.active{background:#ffa500;color:#000;border-color:#ffa500;}

/* ── NO ROUTE MSG ── */
#noRoute{
    position:absolute;top:50%;left:40%;transform:translate(-50%,-50%);
    background:rgba(10,10,10,0.88);
    border:1px solid #333;border-radius:8px;
    padding:20px 28px;text-align:center;
    z-index:600;display:none;pointer-events:none;
}
#noRoute.show{display:block;}
#noRoute p{font-family:Arial;font-size:13px;color:#666;letter-spacing:2px;line-height:1.8;}
#noRoute span{color:#ffa500;font-weight:700;}

/* ── STATUS BAR (global) ── */
#st{position:fixed;bottom:4px;right:8px;font-size:11px;font-family:Arial;
    color:#ffa500;letter-spacing:1px;font-weight:bold;z-index:1000;pointer-events:none;}
.mapActive #st{display:none;}

/* ── PAGE INDICATOR ── */
#pi{position:fixed;top:6px;right:10px;font-size:13px;font-family:Arial;
    color:#444;z-index:1100;pointer-events:none;letter-spacing:4px;}

/* ── DEBUG BUTTONS (page0 only) ── */
#debugBtns{
    position:fixed;top:6px;left:10px;
    display:flex;gap:6px;z-index:1100;
}
.mapActive #debugBtns{display:none;}
.dbtn{
    background:rgba(10,10,10,0.85);
    border:1px solid #333;border-radius:4px;
    color:#666;font-size:10px;font-family:Arial;
    font-weight:700;letter-spacing:2px;
    padding:6px 10px;cursor:pointer;transition:all 0.2s;
}
.dbtn:hover{border-color:#ffa500;color:#ffa500;}
.dbtn.active{background:#ffa500;color:#000;border-color:#ffa500;}

.ok{color:#22c55e!important;}
.err{color:#f87171!important;}

/* Leaflet tweaks */
.leaflet-control-zoom{border:none!important;margin-right:10px!important;margin-bottom:10px!important;}
.leaflet-control-zoom a{
    background:rgba(10,10,10,0.92)!important;color:#888!important;
    border:1px solid #333!important;width:44px!important;height:44px!important;
    line-height:44px!important;font-size:18px!important;
    box-shadow:0 2px 8px rgba(0,0,0,0.5)!important;
}
.leaflet-control-zoom a:hover{background:#1a1a1a!important;color:#ffa500!important;}
</style>
</head>
<body>

<!-- PAGE 0: DASHBOARD -->
<div class="page active" id="page0">
    <div class="frame"><canvas id="c"></canvas></div>
</div>

<!-- PAGE 1: MAP -->
<div class="page" id="page1">
    <div id="map"></div>

    <div id="navBox">
        <div id="navArrow">▲</div>
        <div id="navText"></div>
        <div id="navDist"></div>
    </div>

    <div id="mapBar">
        <div class="mdata">
            <div class="mdata-val big" id="mapSpd">0</div>
            <div class="mdata-lbl">km/h</div>
        </div>
        <div class="mdata">
            <div class="mdata-val med" id="mapGear">-</div>
            <div class="mdata-lbl">GEAR</div>
        </div>
        <div class="mdata">
            <div class="mdata-val sml" id="mapRpm">0</div>
            <div class="mdata-lbl">RPM</div>
        </div>
        <div class="mdata">
            <div class="mdata-val sml" id="mapClt">0.0</div>
            <div class="mdata-lbl">°C CLT</div>
        </div>
        <div class="mdata">
            <div class="mdata-val sml" id="mapBat">0.00</div>
            <div class="mdata-lbl">V BAT</div>
        </div>
    </div>

    <div id="noRoute">
        <p>📍 Nessun percorso attivo<br>
        <span>Usa il pianificatore</span> per<br>
        calcolare e salvare un percorso</p>
    </div>

    <div id="mapControls">
        <button class="mctrl" id="btnNextMap">◀ DASH</button>
        <button class="mctrl" id="btnNorth">N↑</button>
        <button class="mctrl" id="btnZoom">AUTO</button>
    </div>
</div>

<!-- GLOBAL UI -->
<div id="st">TAP TO CONNECT</div>
<div id="pi">●○</div>
<div id="debugBtns">
    <button class="dbtn" id="btnNext">NEXT ▶</button>
    <button class="dbtn" id="btnTheme">☀ LIGHT</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="dashboard.js"></script>
<script src="map.js"></script>
<script src="ble.js"></script>
<script>
// ── Layout sizing: set CSS vars from actual screen ──
function setLayoutVars() {
    const BAR_H  = Math.round(window.innerHeight * 0.13); // ~10% + margine
    const NAV_SZ = window.innerHeight - BAR_H;            // square = remaining height
    // cap nav size to avoid taking too much horizontal space
    const navSize = Math.min(NAV_SZ, Math.round(window.innerWidth * 0.35));
    document.documentElement.style.setProperty('--bar-h',   BAR_H  + 'px');
    document.documentElement.style.setProperty('--nav-size', navSize + 'px');
    // Set navBox height = width
    const nb = document.getElementById('navBox');
    if (nb) { nb.style.height = navSize + 'px'; }
}
window.addEventListener('resize', setLayoutVars);
window.addEventListener('orientationchange', () => setTimeout(setLayoutVars, 150));
setLayoutVars();

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
