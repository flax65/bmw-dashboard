<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW R1100S Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000; /* Nero assoluto per annullare i riflessi */
            color: #FFFFFF; /* Bianco puro per la massima leggibilità dei testi standard */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 10px;
        }

        .dashboard-container {
            width: 100%;
            max-width: 800px;
            background-color: #000000;
            border: 3px solid #CCFF00; /* Bordo giallo fluo ad alta visibilità */
            border-radius: 16px;
            padding: 20px;
            position: relative;
        }

        /* Stato connessione */
        #status-container {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .connected { color: #00FF00; } /* Verde per stato OK */
        .disconnected { color: #FF0000; } /* Rosso per allarme/disconnesso */

        /* Titolo e info di servizio */
        h1 {
            font-size: 1.5rem;
            color: #CCFF00; /* Giallo fluo */
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Layout delle Pagine */
        .page {
            display: none;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .page.active {
            display: grid;
        }

        /* Card dei Dati */
        .card {
            background-color: #000000;
            border: 2px solid #FFFFFF; /* Contorno bianco per staccare i blocchi */
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 140px;
        }

        /* Card a tutta larghezza (Giri e Giri/Velocità a seconda della pagina) */
        .card-full {
            grid-column: span 2;
            min-height: 160px;
            border-color: #CCFF00; /* Evidenziazione per i dati primari di guida */
        }

        .card-label {
            font-size: 1.2rem;
            font-weight: 900;
            text-transform: uppercase;
            color: #FFFFFF; /* Testo etichetta bianco */
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .card-value {
            font-size: 3.5rem;
            font-weight: 900;
            font-variant-numeric: tabular-nums;
            color: #CCFF00; /* Giallo ambra/fluo per i dati numerici principali (massimo contrasto) */
            line-height: 1;
        }

        /* Elementi critici (Marcia e Giri alti) */
        .gear-value {
            font-size: 6rem; /* Dimensione massimizzata per la marcia inserita */
            color: #CCFF00;
        }

        .rpm-value {
            font-size: 4.5rem;
            color: #FFFFFF;
        }

        /* Pulsante di controllo a schermo */
        #connect-btn {
            margin-top: 20px;
            width: 100%;
            padding: 15px;
            font-size: 1.5rem;
            font-weight: bold;
            background-color: #000000;
            color: #CCFF00;
            border: 3px solid #CCFF00;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
        }
        #connect-btn:active {
            background-color: #CCFF00;
            color: #000000;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div id="status-container">
            <span id="status" class="disconnected">DISCONNESSO</span>
        </div>

        <h1>BMW R1100S</h1>

        <div id="page-0" class="page active">
            <div class="card card-full">
                <div class="card-label">Giri Motore (RPM)</div>
                <div id="rpm" class="card-value rpm-value">0</div>
            </div>
            <div class="card">
                <div class="card-label">Velocità (KM/H)</div>
                <div id="spd" class="card-value">0</div>
            </div>
            <div class="card">
                <div class="card-label">Marcia</div>
                <div id="gear" class="card-value gear-value">-</div>
            </div>
        </div>

        <div id="page-1" class="page">
            <div class="card">
                <div class="card-label">Motore (CLT)</div>
                <div id="clt" class="card-value">0.0°C</div>
            </div>
            <div class="card">
                <div class="card-label">Aria (IAT)</div>
                <div id="iat" class="card-value">0.0°C</div>
            </div>
            <div class="card">
                <div class="card-label">Batteria</div>
                <div id="bat" class="card-value">0.00V</div>
            </div>
            <div class="card">
                <div class="card-label">Lambda</div>
                <div id="lmd" class="card-value">0</div>
            </div>
            <div class="card">
                <div class="card-label">Trip</div>
                <div id="trip" class="card-value">0.0</div>
            </div>
            <div class="card">
                <div class="card-label">Totale</div>
                <div id="tot" class="card-value">0.0</div>
            </div>
        </div>

        <button id="connect-btn">Connetti Bluetooth</button>
    </div>

    <script>
        const SERVICE_UUID = "5bc1a100-36e1-4b13-9bbf-8547cb834f11";
        const CHARACTERISTIC_UUID = "5bc1a101-36e1-4b13-9bbf-8547cb834f11";

        let bluetoothDevice = null;
        let dataCharacteristic = null;

        const connectBtn = document.getElementById('connect-btn');
        const statusEl = document.getElementById('status');

        const elements = {
            rpm: document.getElementById('rpm'),
            spd: document.getElementById('spd'),
            gear: document.getElementById('gear'),
            clt: document.getElementById('clt'),
            iat: document.getElementById('iat'),
            bat: document.getElementById('bat'),
            lmd: document.getElementById('lmd'),
            trip: document.getElementById('trip'),
            tot: document.getElementById('tot')
        };

        const pages = [
            document.getElementById('page-0'),
            document.getElementById('page-1')
        ];

        connectBtn.addEventListener('click', async () => {
            if (bluetoothDevice && bluetoothDevice.gatt.connected) {
                disconnect();
            } else {
                await connect();
            }
        });

        async function connect() {
            try {
                statusEl.textContent = "CONNESSIONE...";
                statusEl.className = "disconnected";

                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ name: "BMW_R1100S_Dashboard" }],
                    optionalServices: [SERVICE_UUID]
                });

                bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnected);

                const server = await bluetoothDevice.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                dataCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

                await dataCharacteristic.startNotifications();
                dataCharacteristic.addEventListener('characteristicvaluechanged', handleData);

                statusEl.textContent = "CONNESSO";
                statusEl.className = "connected";
                connectBtn.textContent = "Disconnetti";
            } catch (error) {
                console.error(error);
                statusEl.textContent = "ERRORE";
                statusEl.className = "disconnected";
            }
        }

        function disconnect() {
            if (bluetoothDevice && bluetoothDevice.gatt.connected) {
                bluetoothDevice.gatt.disconnect();
            }
        }

        function onDisconnected() {
            statusEl.textContent = "DISCONNESSO";
            statusEl.className = "disconnected";
            connectBtn.textContent = "Connetti Bluetooth";
            clearData();
        }

        function handleData(event) {
            const decoder = new TextDecoder('utf-8');
            const jsonString = decoder.decode(event.target.value);

            try {
                const data = JSON.parse(jsonString);

                // Aggiornamento dati con fallbacks di sicurezza
                elements.rpm.textContent = data.rpm ?? 0;
                elements.spd.textContent = data.spd ?? 0;
                elements.gear.textContent = (data.gear === 0 || !data.gear) ? "N" : data.gear;
                elements.clt.textContent = (data.clt ?? 0) + "°C";
                elements.iat.textContent = (data.iat ?? 0) + "°C";
                elements.bat.textContent = (data.bat ?? 0) + "V";
                elements.lmd.textContent = data.lmd ?? 0;
                elements.trip.textContent = data.trip ?? 0;
                elements.tot.textContent = data.tot ?? 0;

                // Gestione cambio pagina comandato da ESP32
                if (typeof data.page !== 'undefined') {
                    switchPage(data.page);
                }
            } catch (e) {
                console.error("Errore parsing JSON:", e);
            }
        }

        function switchPage(pageNum) {
            pages.forEach((page, index) => {
                if (index === pageNum) {
                    page.classList.add('active');
                } else {
                    page.classList.remove('active');
                }
            });
        }

        function clearData() {
            elements.rpm.textContent = "0";
            elements.spd.textContent = "0";
            elements.gear.textContent = "-";
            elements.clt.textContent = "0.0°C";
            elements.iat.textContent = "0.0°C";
            elements.bat.textContent = "0.00V";
            elements.lmd.textContent = "0";
            elements.trip.textContent = "0.0";
            elements.tot.textContent = "0.0";
        }
    </script>
</body>
</html>
