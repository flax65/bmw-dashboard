<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111111">
<link rel="manifest" href="Manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<title>BMW R1100S</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#111;overflow:hidden;}

/* ── PAGES ── */
.page{width:100%;height:100%;display:none;position:fixed;top:0;left:0;}
.page.active{display:block;}

/* Page 0 – Dashboard */
#page0{display:none;background:#111;}
#page0.active{display:block;}
.frame{position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;overflow:hidden;}
canvas{position:fixed;top:0;left:0;display:block;cursor:pointer;}

/* Page 1 – Map */
#page1{background:#0a0a0a;}
#map{width:100%;height:100%;}

/* ── TURN INSTRUCTION BAR ── */
#navBar{
    position:fixed;top:0;left:0;right:0;height:48px;
    background:rgba(0,0,0,0.88);
    display:none;align-items:center;gap:12px;
    padding:0 16px;z-index:590;
    border-bottom:1px solid #222;
}
#navBar.show{display:flex;}
#navArrow{font-size:28px;line-height:1;flex-shrink:0;}
#navText{font-family:Arial;font-size:14px;font-weight:600;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#navDist{font-family:Arial;font-size:20px;font-weight:700;color:#ffa500;flex-shrink:0;letter-spacing:1px;}

/* ── DATA OVERLAY (bottom) ── */
#mapOverlay{
    position:fixed;bottom:0;left:0;right:0;
    background:rgba(0,0,0,0.88);
    display:flex;align-items:stretch;
    z-index:500;pointer-events:none;
    border-top:1px solid #222;
}
.mdata{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:6px 4px;border-right:1px solid #1a1a1a;
}
.mdata:last-child{border-right:none;}
.mdata-val{font-family:Arial;font-weight:700;color:#fff;line-height:1;}
.mdata-lbl{font-family:Arial;font-size:8px;color:#555;letter-spacing:2px;margin-top:2px;}
.mdata-val.big{font-size:28px;color:#ffa500;}
.mdata-val.med{font-size:18px;}
.mdata-val.sml{font-size:14px;color:#aaa;}

/* ── MAP CONTROLS (overlay buttons) ── */
#mapControls{
    position:fixed;left:10px;bottom:90px;
    display:flex;flex-direction:column;gap:6px;
    z-index:600;
}
.mctrl{
    width:44px;height:44px;
    background:rgba(10,10,10,0.92);
    border:1px solid #333;border-radius:6px;
    color:#aaa;font-size:10px;font-weight:700;
    letter-spacing:0.5px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:all 0.2s;font-family:Arial;
    box-shadow:0 2px 8px rgba(0,0,0,0.5);
}
.mctrl:hover{border-color:#ffa500;color:#ffa500;}
.mctrl.active{background:#ffa500;color:#000;border-color:#ffa500;}

/* ── STATUS BAR (global) ── */
#st{position:fixed;bottom:4px;right:8px;font-size:11px;font-family:Arial;
    color:#ffa500;letter-spacing:1px;font-weight:bold;z-index:1000;pointer-events:none;}
.mapActive #st{bottom:80px;}

/* Page Indicator */
#pi{position:fixed;top:6px;right:10px;font-size:13px;font-family:Arial;
    color:#444;z-index:1100;pointer-events:none;letter-spacing:4px;}

/* Debug buttons top-left */
#debugBtns{
    position:fixed;top:6px;left:10px;
    display:flex;gap:6px;z-index:1100;
    transition: opacity 0.2s;
}
.mapActive #debugBtns{
    display:none;
}
.dbtn{
    background:rgba(10,10,10,0.85);
    border:1px solid #333;border-radius:4px;
    color:#666;font-size:10px;font-family:Arial;
    font-weight:700;letter-spacing:2px;
    padding:6px 10px;cursor:pointer;
    transition:all 0.2s;
}
.dbtn:hover{border-color:#ffa500;color:#ffa500;}
.dbtn.active{background:#ffa500;color:#000;border-color:#ffa500;}

/* No route message / Dialog Box */
#noRoute{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    background:rgba(10,10,10,0.95);
    border:1px solid #333;border-radius:8px;
    padding:20px 28px;text-align:center;
    z-index:700;display:none;pointer-events:auto;
    box-shadow:0 4px 20px rgba(0,0,0,0.8);
}
#noRoute.show{display:block;}
#noRoute p{font-family:Arial;font-size:13px;color:#eee;letter-spacing:1px;line-height:1.8;margin-bottom:16px;}
#noRoute span{color:#ffa500;font-weight:700;}

.dialog-btns{
    display:flex;flex-direction:column;gap:8px;margin-top:12px;
}
.dialog-btn{
    background:#222;border:1px solid #444;border-radius:4px;
    color:#fff;font-family:Arial;font-size:12px;font-weight:700;
    padding:10px;cursor:pointer;transition:all 0.2s;
    letter-spacing:1px;
}
.dialog-btn:hover{border-color:#ffa500;color:#ffa500;}
.dialog-btn.primary{background:#ffa500;color:#000;border-color:#ffa500;}

.ok{color:#22c55e!important;}
.err{color:#f87171!important;}

/* Leaflet tweaks */
.leaflet-control-zoom{border:none!important;margin-right:10px!important;margin-bottom:80px!important;}
.leaflet-control-zoom a{
    background:rgba(10,10,10,0.92)!important;color:#888!important;
    border:1px solid #333!important;width:44px!important;height:44px!important;
    line-height:44px!important;font-size:18px!important;
    box-shadow:0 2px 8px rgba(0,0,0,0.5)!important;
}
.leaflet-control-zoom a:hover{background:#1a1a1a!important;color:#ffa500!important;}
</style>
</head>
<body>

<div class="page active" id="page0">
    <div class="frame">
        <canvas id="c"></canvas>
    </div>
</div>

<div class="page" id="page1">
    <div id="map"></div>

    <div id="navBar">
        <div id="navArrow">↑</div>
        <div id="navText">In rotta</div>
        <div id="navDist"></div>
    </div>

    <div id="mapOverlay">
        <div class="mdata">
            <div class="mdata-val big" id="mapSpd">0</div>
            <div class="mdata-lbl">km/h</div>
        </div>
        <div class="mdata">
            <div class="mdata-val med" id="mapGear">-</div>
            <div class="mdata-lbl">GEAR</div>
        </div>
        <div class="mdata">
            <div class="mdata-val sml" id="mapRpm">0</div>
            <div class="mdata-lbl">RPM</div>
        </div>
        <div class="mdata">
            <div class="mdata-val sml" id="mapClt">0.0</div>
            <div class="mdata-lbl">°C CLT</div>
        </div>
        <div class="mdata">
            <div class="mdata-val sml" id="mapBat">0.00</div>
            <div class="mdata-lbl">V BAT</div>
        </div>
    </div>

    <div id="noRoute">
        <p>📍 Gestione Percorso<br><span>È presente una rotta memorizzata</span></p>
        <div class="dialog-btns">
            <button class="dialog-btn primary" id="btnAcceptRoute">ACCETTA ROTTA</button>
            <button class="dialog-btn" id="btnCancelRoute">CANCELLA</button>
            <button class="dialog-btn" id="btnOpenPlanner">APRI PLANNER</button>
        </div>
    </div>

    <div id="mapControls">
        <button class="mctrl" id="btnNextMap" title="Torna a dashboard">◀ DASH</button>
        <button class="mctrl" id="btnNorth"   title="Nord fisso / Heading up">N↑</button>
        <button class="mctrl" id="btnZoom"    title="Zoom auto / manuale">AUTO</button>
    </div>
</div>

<div id="st">TAP TO CONNECT</div>
<div id="pi">●○</div>
<div id="debugBtns">
    <button class="dbtn" id="btnNext">NEXT ▶</button>
    <button class="dbtn" id="btnTheme">☀ LIGHT</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ═══════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════
const SERVICE_UUID        = '5bc1a100-36e1-4b13-9bbf-8547cb834f11';
const CHARACTERISTIC_UUID = '5bc1a101-36e1-4b13-9bbf-8547cb834f11';
const DEVICE_NAME         = 'BMW_R1100S_Dashboard';
const NUM_PAGES           = 2;
const W = 800, H = 360;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const pi = document.getElementById('pi');
const st = document.getElementById('st');

let theme = localStorage.getItem('dashTheme') || 'light';

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let data = { rpm:0, spd:0, iat:0, clt:0, lmd:0, bat:0, gear:'-', tot:0, trip:0, page:0 };
let currentPage  = 0;
let pollInterval = null;
let bleDevice    = null;
let retryTimer   = null;

let leafletMap  = null;
let mapMarker   = null;
let watchId     = null;

// ═══════════════════════════════════════════════
//  PAGE MANAGEMENT
// ═══════════════════════════════════════════════
function switchPage(n) {
    const target = ((n % NUM_PAGES) + NUM_PAGES) % NUM_PAGES;
    if (target === currentPage) return;

    document.getElementById('page' + currentPage).classList.remove('active');
    currentPage = target;
    document.getElementById('page' + currentPage).classList.add('active');

    document.body.className = currentPage === 1 ? 'mapActive' : '';

    updatePageIndicator();

    if (currentPage === 1) initMap();
    else resizeAndDraw();
}

function updatePageIndicator() {
    let s = '';
    for (let i = 0; i < NUM_PAGES; i++) s += (i === currentPage ? '●' : '○');
    pi.textContent = s;
}

// ═══════════════════════════════════════════════
//  MAP (Leaflet + GPS)
// ═══════════════════════════════════════════════
let headingUp   = false;
let autoZoom    = true;
let zoomManTimer = null;
let routeLayer  = null;
let navSteps    = [];
let currentStep = 0;
let gpsSpeed    = 0;
let gpsHeading  = 0;

const markerHtml = `<div style="
    width:20px;height:20px;background:#ffa500;
    border-radius:50%;border:3px solid #fff;
    box-shadow:0 0 10px rgba(255,165,0,0.8);
"></div>`;
const markerIcon = L.divIcon({
    className:'', html: markerHtml,
    iconSize:[20,20], iconAnchor:[10,10]
});

function initGPS() {
    if ('geolocation' in navigator && !watchId) {
        watchId = navigator.geolocation.watchPosition(pos => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            gpsSpeed   = pos.coords.speed ? pos.coords.speed * 3.6 : 0;
            gpsHeading = pos.coords.heading || 0;

            const mapSpdEl = document.getElementById('mapSpd');
            if (mapSpdEl) mapSpdEl.textContent = Math.round(gpsSpeed);

            if (currentPage === 0) {
                draw();
            }

            if (leafletMap) {
                if (!mapMarker) {
                    mapMarker = L.marker([lat, lng], { icon: markerIcon }).addTo(leafletMap);
                } else {
                    mapMarker.setLatLng([lat, lng]);
                }

                if (headingUp && gpsHeading !== null) {
                    leafletMap.getContainer().style.transform = `rotate(${-gpsHeading}deg) scale(1.5)`;
                    leafletMap.getContainer().style.transformOrigin = '50% 50%';
                } else {
                    leafletMap.getContainer().style.transform = '';
                }

                if (autoZoom) {
                    let z = 16;
                    if      (gpsSpeed > 130) z = 12;
                    else if (gpsSpeed > 90)  z = 13;
                    else if (gpsSpeed > 50)  z = 14;
                    else if (gpsSpeed > 10)  z = 15;
                    if (leafletMap.getZoom() !== z)
                        leafletMap.setZoom(z, { animate: true });
                }

                leafletMap.panTo([lat, lng], { animate: true, duration: 0.5 });
            }

            updateNavigation(lat, lng);

        }, null, { enableHighAccuracy: true, maximumAge: 1000 });
    }
}

function initMap() {
    if (leafletMap) { leafletMap.invalidateSize(); return; }

    leafletMap = L.map('map', {
        zoomControl: true,
        attributionControl: false,
        tap: true
    }).setView([45.65, 13.77], 15);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        maxZoom: 19, subdomains: 'abcd'
    }).addTo(leafletMap);

    leafletMap.on('zoomstart', () => {
        if (autoZoom) {
            autoZoom = false;
            document.getElementById('btnZoom').textContent = 'MAN';
            document.getElementById('btnZoom').classList.remove('active');
        }
        clearTimeout(zoomManTimer);
        zoomManTimer = setTimeout(() => {
            autoZoom = true;
            document.getElementById('btnZoom').textContent = 'AUTO';
            document.getElementById('btnZoom').classList.add('active');
        }, 10000);
    });

    loadRoute();

    document.getElementById('btnNorth').addEventListener('click', () => {
        headingUp = !headingUp;
        const btn = document.getElementById('btnNorth');
        btn.textContent = headingUp ? 'HDG' : 'N↑';
        btn.classList.toggle('active', headingUp);
        if (!headingUp) leafletMap.getContainer().style.transform = '';
    });

    document.getElementById('btnZoom').addEventListener('click', () => {
        autoZoom = !autoZoom;
        const btn = document.getElementById('btnZoom');
        btn.textContent = autoZoom ? 'AUTO' : 'MAN';
        btn.classList.toggle('active', autoZoom);
        clearTimeout(zoomManTimer);
    });

    document.getElementById('btnZoom').classList.add('active');

    document.getElementById('btnNextMap').addEventListener('click', () => {
        switchPage(0);
    });

    document.getElementById('btnAcceptRoute').addEventListener('click', () => {
        document.getElementById('noRoute').classList.remove('show');
    });

    document.getElementById('btnCancelRoute').addEventListener('click', () => {
        if (routeLayer) { routeLayer.remove(); routeLayer = null; }
        navSteps = [];
        document.getElementById('navBar').classList.remove('show');
        document.getElementById('noRoute').innerHTML = `<p>📍 Nessun percorso attivo<br><span>Usa il pianificatore</span> per<br>calcolare e salvare un percorso</p>
        <div class="dialog-btns"><button class="dialog-btn" id="btnOpenPlannerFallback">APRI PLANNER</button></div>`;
        document.getElementById('btnOpenPlannerFallback').addEventListener('click', () => {
            window.location.href = './planner.html';
        });
    });

    document.getElementById('btnOpenPlanner').addEventListener('click', () => {
        window.location.href = './planner.html';
    });
}

async function loadRoute() {
    const noRouteEl = document.getElementById('noRoute');
