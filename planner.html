<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#1a1a2e">
<title>BMW R1100S — Pianificatore</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
    --bg:        #0d0d0d;
    --panel:     #141414;
    --border:    #2a2a2a;
    --accent:    #ffa500;
    --accent2:   #ff6b00;
    --text:      #e8e8e8;
    --muted:     #666;
    --ok:        #22c55e;
    --err:       #f87171;
    --input-bg:  #1c1c1c;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
}

/* ── LAYOUT ── */
#app {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
}

/* ── HEADER ── */
#header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 1000;
}
#header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
}
#header span {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
}
#btnSettings {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 34px; height: 34px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
}
#btnSettings:hover { border-color: var(--accent); color: var(--accent); }

/* ── MAIN AREA ── */
#main {
    display: grid;
    grid-template-columns: 340px 1fr;
    overflow: hidden;
}

/* ── SIDEBAR ── */
#sidebar {
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* INPUTS */
#inputArea {
    padding: 14px;
    border-bottom: 1px solid var(--border);
}

.field {
    margin-bottom: 10px;
}
.field label {
    display: block;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 5px;
    text-transform: uppercase;
}
.inputRow {
    display: flex;
    gap: 6px;
}
.inputRow input {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    padding: 8px 10px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s;
}
.inputRow input:focus { border-color: var(--accent); }
.inputRow input::placeholder { color: var(--muted); }
.btnGeo {
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 34px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
}
.btnGeo:hover { border-color: var(--accent); color: var(--accent); }

/* Suggestions dropdown */
.suggestions {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 4px 4px;
    max-height: 120px;
    overflow-y: auto;
    display: none;
}
.suggestions.show { display: block; }
.suggestion-item {
    padding: 7px 10px;
    font-size: 12px;
    color: var(--text);
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    line-height: 1.3;
}
.suggestion-item:last-child { border-bottom: none; }
.suggestion-item:hover { background: #222; color: var(--accent); }

#btnCalc {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 4px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    margin-top: 4px;
}
#btnCalc:hover { background: var(--accent2); }
#btnCalc:disabled { background: #333; color: #555; cursor: not-allowed; }

/* ROUTE INFO */
#routeInfo {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: none;
}
#routeInfo.show { display: block; }
.routeMeta {
    display: flex;
    gap: 20px;
    margin-bottom: 10px;
}
.routeMeta .val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    color: var(--accent);
    line-height: 1;
}
.routeMeta .lbl {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-top: 2px;
}

/* STEPS LIST */
#stepsList {
    flex: 1;
    overflow-y: auto;
    padding: 0;
}
#stepsList::-webkit-scrollbar { width: 3px; }
#stepsList::-webkit-scrollbar-track { background: transparent; }
#stepsList::-webkit-scrollbar-thumb { background: var(--border); }

.step {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
}
.step:hover { background: #1a1a1a; }
.step-icon {
    width: 28px; height: 28px;
    background: #1e1e1e;
    border: 1px solid var(--border);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    margin-top: 1px;
}
.step-content { flex: 1; }
.step-instruction {
    font-size: 13px;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 2px;
}
.step-dist {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
}

/* ── WAYPOINTS ── */
#waypointsArea { overflow-y: auto; max-height: 160px; }
#btnAddWp {
    width: 100%; padding: 7px;
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--muted);
    border-radius: 4px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px; letter-spacing: 2px;
    cursor: pointer; transition: all 0.2s;
}
#btnAddWp:hover { border-color: var(--accent); color: var(--accent); }
.wp-row {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 6px; position: relative;
}
.wp-num {
    width: 20px; height: 20px; background: var(--accent); color: #000;
    border-radius: 50%; font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.wp-inp {
    flex: 1; background: var(--input-bg); border: 1px solid var(--border);
    color: var(--text); font-family: 'Rajdhani', sans-serif;
    font-size: 13px; padding: 7px 10px; border-radius: 4px; outline: none;
}
.wp-inp:focus { border-color: var(--accent); }
.wp-inp::placeholder { color: var(--muted); }
.wp-del {
    background: var(--input-bg); border: 1px solid var(--border);
    color: var(--err); width: 28px; height: 28px; border-radius: 4px;
    cursor: pointer; font-size: 13px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
}
.wp-del:hover { background: var(--err); color: #000; border-color: var(--err); }
.wp-sug {
    position: absolute; top: 32px; left: 26px; right: 34px;
    background: var(--input-bg); border: 1px solid var(--border);
    border-top: none; border-radius: 0 0 4px 4px;
    max-height: 100px; overflow-y: auto; z-index: 600; display: none;
}
.wp-sug.show { display: block; }

/* ── MAP ── */
#map { width: 100%; height: 100%; z-index: 1; }

/* ── BOTTOM BAR ── */
#bottomBar {
    display: flex;
    gap: 10px;
    padding: 10px 16px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    z-index: 1000;
}
#btnSave {
    flex: 1;
    padding: 11px;
    background: var(--ok);
    color: #000;
    border: none;
    border-radius: 4px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
}
#btnSave:hover { filter: brightness(1.1); }
#btnSave:disabled { background: #333; color: #555; cursor: not-allowed; }
#btnClear {
    padding: 11px 16px;
    background: transparent;
    color: var(--err);
    border: 1px solid var(--err);
    border-radius: 4px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
}
#btnClear:hover { background: var(--err); color: #000; }

/* ── STATUS ── */
#statusBar {
    position: fixed;
    bottom: 60px; left: 50%; transform: translateX(-50%);
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 12px;
    letter-spacing: 2px;
    z-index: 2000;
    display: none;
    white-space: nowrap;
}
#statusBar.show { display: block; }
#statusBar.ok { border-color: var(--ok); color: var(--ok); }
#statusBar.err { border-color: var(--err); color: var(--err); }

/* ── SETTINGS MODAL ── */
#settingsModal {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 3000;
    align-items: center;
    justify-content: center;
}
#settingsModal.show { display: flex; }
#settingsBox {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    width: 360px;
    max-width: 90vw;
}
#settingsBox h2 {
    font-size: 14px;
    letter-spacing: 4px;
    color: var(--accent);
    margin-bottom: 20px;
    text-transform: uppercase;
}
.settingField {
    margin-bottom: 14px;
}
.settingField label {
    display: block;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 5px;
    text-transform: uppercase;
}
.settingField input {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 9px 10px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s;
}
.settingField input:focus { border-color: var(--accent); }
.settingActions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}
.btnSaveSett {
    flex: 1;
    padding: 10px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 4px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
}
.btnCancelSett {
    padding: 10px 16px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    cursor: pointer;
}

/* Leaflet overrides */
.leaflet-control-zoom a {
    background: var(--panel) !important;
    color: var(--muted) !important;
    border-color: var(--border) !important;
}
.leaflet-control-zoom a:hover {
    background: #222 !important;
    color: var(--accent) !important;
}
.leaflet-control-attribution { display: none; }
</style>
</head>
<body>
<div id="app">

    <!-- HEADER -->
    <div id="header">
        <div>
            <h1>BMW R1100S</h1>
            <span>PIANIFICATORE PERCORSO</span>
        </div>
        <button id="btnSettings" title="Impostazioni">⚙</button>
    </div>

    <!-- MAIN -->
    <div id="main">

        <!-- SIDEBAR -->
        <div id="sidebar">
            <div id="inputArea">

                <!-- PARTENZA -->
                <div class="field">
                    <label>Partenza</label>
                    <div class="inputRow">
                        <input type="text" id="inpFrom" placeholder="Indirizzo di partenza..." autocomplete="off">
                        <button class="btnGeo" id="btnGpsFrom" title="Usa GPS">📍</button>
                    </div>
                    <div class="suggestions" id="sugFrom"></div>
                </div>

                <!-- DESTINAZIONE -->
                <div class="field">
                    <label>Destinazione</label>
                    <div class="inputRow">
                        <input type="text" id="inpTo" placeholder="Indirizzo di destinazione...">
                    </div>
                    <div class="suggestions" id="sugTo"></div>
                </div>

            </div>

            <!-- WAYPOINTS -->
            <div id="waypointsArea" style="padding:0 14px 8px; border-bottom:1px solid var(--border);">
                <div style="font-size:10px;letter-spacing:3px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;">Tappe intermedie</div>
                <div id="wpList"></div>
                <button id="btnAddWp">+ Aggiungi tappa</button>
            </div>

            <div style="padding:10px 14px; border-bottom:1px solid var(--border);">
                <button id="btnCalc" disabled>Calcola percorso</button>
            </div>

            <!-- ROUTE INFO -->
            <div id="routeInfo">
                <div class="routeMeta">
                    <div>
                        <div class="val" id="routeDist">—</div>
                        <div class="lbl">KM</div>
                    </div>
                    <div>
                        <div class="val" id="routeTime">—</div>
                        <div class="lbl">DURATA</div>
                    </div>
                </div>
            </div>

            <!-- STEPS -->
            <div id="stepsList"></div>
        </div>

        <!-- MAP -->
        <div id="map"></div>
    </div>

    <!-- BOTTOM BAR -->
    <div id="bottomBar">
        <button id="btnSave" disabled>💾 Salva e carica su moto</button>
        <button id="btnClear">✕ Cancella</button>
    </div>
</div>

<!-- STATUS -->
<div id="statusBar"></div>

<!-- SETTINGS MODAL -->
<div id="settingsModal">
    <div id="settingsBox">
        <h2>⚙ Impostazioni</h2>
        <div class="settingField">
            <label>GitHub Token</label>
            <input type="password" id="setToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
        </div>
        <div class="settingField">
            <label>GitHub Username</label>
            <input type="text" id="setUser" placeholder="tuousername">
        </div>
        <div class="settingField">
            <label>Nome Repository</label>
            <input type="text" id="setRepo" placeholder="nome-repo">
        </div>
        <div class="settingActions">
            <button class="btnSaveSett" id="btnSaveSett">Salva</button>
            <button class="btnCancelSett" id="btnCancelSett">Annulla</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let fromCoords = null, toCoords = null;
let waypoints = []; // array of {coords, id}
let routeData  = null;
let routeLayer = null, markerFrom = null, markerTo = null;
let wpMarkers  = [];
let geocodeTimers = {};

// ═══════════════════════════════════════════════
//  SETTINGS (localStorage)
// ═══════════════════════════════════════════════
function loadSettings() {
    return {
        token: localStorage.getItem('gh_token') || '',
        user:  localStorage.getItem('gh_user')  || '',
        repo:  localStorage.getItem('gh_repo')  || ''
    };
}
function saveSettings(s) {
    localStorage.setItem('gh_token', s.token);
    localStorage.setItem('gh_user',  s.user);
    localStorage.setItem('gh_repo',  s.repo);
}

// ═══════════════════════════════════════════════
//  MAP INIT
// ═══════════════════════════════════════════════
const map = L.map('map', {
    zoomControl: true,
    attributionControl: false
}).setView([45.65, 13.77], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    subdomains: 'abc'
}).addTo(map);

function makeIcon(color) {
    return L.divIcon({
        className: '',
        html: `<div style="
            width:14px;height:14px;
            background:${color};
            border-radius:50%;
            border:2px solid #fff;
            box-shadow:0 2px 6px rgba(0,0,0,0.4);
        "></div>`,
        iconSize: [14, 14],
        iconAnchor: [7, 7]
    });
}

// ═══════════════════════════════════════════════
//  GEOCODING (Nominatim)
// ═══════════════════════════════════════════════
async function geocode(query) {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5&addressdetails=1`;
    const res = await fetch(url, { headers: { 'Accept-Language': 'it' } });
    return await res.json();
}

function setupAutocomplete(inputEl, sugEl, onSelect) {
    inputEl.addEventListener('input', () => {
        clearTimeout(geocodeTimers[inputEl.id]);
        const q = inputEl.value.trim();
        if (q.length < 3) { sugEl.classList.remove('show'); return; }
        geocodeTimers[inputEl.id] = setTimeout(async () => {
            try {
                const results = await geocode(q);
                sugEl.innerHTML = '';
                if (!results.length) { sugEl.classList.remove('show'); return; }
                results.forEach(r => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.textContent = r.display_name;
                    div.addEventListener('click', () => {
                        inputEl.value = r.display_name;
                        sugEl.classList.remove('show');
                        onSelect({ lat: parseFloat(r.lat), lng: parseFloat(r.lon), label: r.display_name });
                    });
                    sugEl.appendChild(div);
                });
                sugEl.classList.add('show');
            } catch(e) {}
        }, 500);
    });

    document.addEventListener('click', e => {
        if (!e.target.closest('.field')) sugEl.classList.remove('show');
    });
}

setupAutocomplete(
    document.getElementById('inpFrom'),
    document.getElementById('sugFrom'),
    c => { fromCoords = c; updateMarker('from', c); checkReady(); }
);
setupAutocomplete(
    document.getElementById('inpTo'),
    document.getElementById('sugTo'),
    c => { toCoords = c; updateMarker('to', c); checkReady(); }
);

// GPS button for departure
document.getElementById('btnGpsFrom').addEventListener('click', () => {
    if (!navigator.geolocation) return;
    showStatus('Localizzazione GPS...', '');
    navigator.geolocation.getCurrentPosition(pos => {
        const lat = pos.coords.latitude, lng = pos.coords.longitude;
        fromCoords = { lat, lng, label: `${lat.toFixed(5)}, ${lng.toFixed(5)}` };
        document.getElementById('inpFrom').value = fromCoords.label;
        updateMarker('from', fromCoords);
        checkReady();
        hideStatus();
    }, () => showStatus('GPS non disponibile', 'err'));
});

function updateMarker(type, coords) {
    if (type === 'from') {
        if (markerFrom) markerFrom.remove();
        markerFrom = L.marker([coords.lat, coords.lng], { icon: makeIcon('#22c55e') }).addTo(map);
    } else {
        if (markerTo) markerTo.remove();
        markerTo = L.marker([coords.lat, coords.lng], { icon: makeIcon('#f87171') }).addTo(map);
    }
    if (fromCoords && toCoords) {
        map.fitBounds([[fromCoords.lat, fromCoords.lng], [toCoords.lat, toCoords.lng]], { padding: [40, 40] });
    } else {
        map.setView([coords.lat, coords.lng], 13);
    }
}

function checkReady() {
    document.getElementById('btnCalc').disabled = !(fromCoords && toCoords);
}

// ═══════════════════════════════════════════════
//  ROUTING (OSRM)
// ═══════════════════════════════════════════════
document.getElementById('btnCalc').addEventListener('click', async () => {
    if (!fromCoords || !toCoords) return;
    showStatus('Calcolo percorso...', '');
    document.getElementById('btnCalc').disabled = true;

    try {
        // Build coordinate string: from + waypoints + to
        const allPoints = [fromCoords, ...waypoints.map(w => w.coords), toCoords];
        const coordStr  = allPoints.map(p => `${p.lng},${p.lat}`).join(';');
        const url = `https://router.project-osrm.org/route/v1/driving/${coordStr}`
            + `?steps=true&geometries=geojson&overview=full&annotations=false`;

        const res  = await fetch(url);
        const json = await res.json();

        if (json.code !== 'Ok' || !json.routes.length) {
            showStatus('Percorso non trovato', 'err');
            document.getElementById('btnCalc').disabled = false;
            return;
        }

        routeData = json.routes[0];
        renderRoute(routeData);
        hideStatus();

    } catch(e) {
        showStatus('Errore di rete', 'err');
    }

    document.getElementById('btnCalc').disabled = false;
});

function renderRoute(route) {
    // Draw polyline
    if (routeLayer) routeLayer.remove();
    // Clear old waypoint markers
    wpMarkers.forEach(m => m.remove()); wpMarkers = [];
    const coords = route.geometry.coordinates.map(c => [c[1], c[0]]);
    routeLayer = L.polyline(coords, {
        color: '#ffa500', weight: 4, opacity: 0.85
    }).addTo(map);
    map.fitBounds(routeLayer.getBounds(), { padding: [30, 30] });
    // Draw numbered waypoint markers on map
    waypoints.forEach((wp, i) => {
        const icon = L.divIcon({
            className: '',
            html: `<div style="width:20px;height:20px;background:#ffa500;color:#000;border-radius:50%;border:2px solid #fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;">${i+1}</div>`,
            iconSize: [20,20], iconAnchor: [10,10]
        });
        wpMarkers.push(L.marker([wp.coords.lat, wp.coords.lng], { icon }).addTo(map));
    });

    // Distance & duration
    const km  = (route.distance / 1000).toFixed(1);
    const min = Math.round(route.duration / 60);
    const h   = Math.floor(min / 60), m = min % 60;
    document.getElementById('routeDist').textContent = km;
    document.getElementById('routeTime').textContent = h > 0 ? `${h}h ${m}m` : `${m}m`;
    document.getElementById('routeInfo').classList.add('show');

    // Steps
    const stepsList = document.getElementById('stepsList');
    stepsList.innerHTML = '';
    route.legs.forEach(leg => {
        leg.steps.forEach(step => {
            if (!step.maneuver) return;
            const div = document.createElement('div');
            div.className = 'step';
            div.innerHTML = `
                <div class="step-icon">${maneuverIcon(step.maneuver.type, step.maneuver.modifier)}</div>
                <div class="step-content">
                    <div class="step-instruction">${step.name || formatManeuver(step.maneuver.type, step.maneuver.modifier)}</div>
                    <div class="step-dist">${formatDist(step.distance)}</div>
                </div>`;
            stepsList.appendChild(div);
        });
    });

    document.getElementById('btnSave').disabled = false;
}

function maneuverIcon(type, mod) {
    if (type === 'arrive') return '🏁';
    if (type === 'depart') return '🚦';
    if (type === 'roundabout' || type === 'rotary') return '🔄';
    if (!mod) return '↑';
    const icons = {
        'left': '↰', 'sharp left': '↺', 'slight left': '↖',
        'right': '↱', 'sharp right': '↻', 'slight right': '↗',
        'straight': '↑', 'uturn': '↩'
    };
    return icons[mod] || '↑';
}

function formatManeuver(type, mod) {
    if (type === 'arrive') return 'Arrivo a destinazione';
    if (type === 'depart') return 'Partenza';
    if (type === 'roundabout') return 'Entra nella rotatoria';
    const labels = {
        'left': 'Svolta a sinistra', 'sharp left': 'Svolta brusca a sinistra',
        'slight left': 'Tieni la sinistra', 'right': 'Svolta a destra',
        'sharp right': 'Svolta brusca a destra', 'slight right': 'Tieni la destra',
        'straight': 'Prosegui dritto', 'uturn': 'Inversione a U'
    };
    return labels[mod] || 'Continua';
}

function formatDist(m) {
    return m >= 1000 ? (m/1000).toFixed(1) + ' km' : Math.round(m) + ' m';
}

// ═══════════════════════════════════════════════
//  SAVE TO GITHUB
// ═══════════════════════════════════════════════
document.getElementById('btnSave').addEventListener('click', async () => {
    if (!routeData) return;
    const s = loadSettings();
    if (!s.token || !s.user || !s.repo) {
        showStatus('Configura le impostazioni GitHub', 'err');
        document.getElementById('settingsModal').classList.add('show');
        return;
    }

    showStatus('Salvataggio su GitHub...', '');
    document.getElementById('btnSave').disabled = true;

    // Build payload
    const payload = {
        from:      fromCoords,
        to:        toCoords,
        waypoints: waypoints.map(w => w.coords),
        route:     routeData,
        savedAt:   new Date().toISOString()
    };

    try {
        // Check if file exists (need SHA for update)
        const apiBase = `https://api.github.com/repos/${s.user}/${s.repo}/contents/route.json`;
        let sha = null;
        try {
            const check = await fetch(apiBase, {
                headers: { 'Authorization': `token ${s.token}` }
            });
            if (check.ok) { const j = await check.json(); sha = j.sha; }
        } catch(e) {}

        const body = {
            message: `Route update ${new Date().toLocaleString('it')}`,
            content: btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))))
        };
        if (sha) body.sha = sha;

        const res = await fetch(apiBase, {
            method: 'PUT',
            headers: {
                'Authorization': `token ${s.token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(body)
        });

        if (res.ok) {
            showStatus('✓ Percorso salvato — pronto per la moto', 'ok');
        } else {
            const err = await res.json();
            showStatus('Errore: ' + (err.message || res.status), 'err');
        }
    } catch(e) {
        showStatus('Errore di rete', 'err');
    }

    document.getElementById('btnSave').disabled = false;
});

// ═══════════════════════════════════════════════
//  CLEAR
// ═══════════════════════════════════════════════
document.getElementById('btnClear').addEventListener('click', async () => {
    // Reset state
    fromCoords = toCoords = routeData = null;
    waypoints = []; wpMarkers.forEach(m => m.remove()); wpMarkers = [];
    if (routeLayer) { routeLayer.remove(); routeLayer = null; }
    if (markerFrom) { markerFrom.remove(); markerFrom = null; }
    if (markerTo)   { markerTo.remove();   markerTo   = null; }
    document.getElementById('inpFrom').value = '';
    document.getElementById('inpTo').value   = '';
    document.getElementById('wpList').innerHTML = '';
    document.getElementById('stepsList').innerHTML = '';
    document.getElementById('routeInfo').classList.remove('show');
    document.getElementById('btnCalc').disabled = true;
    document.getElementById('btnSave').disabled = true;

    // Clear route.json on GitHub
    const s = loadSettings();
    if (!s.token || !s.user || !s.repo) return;

    try {
        const apiBase = `https://api.github.com/repos/${s.user}/${s.repo}/contents/route.json`;
        const check = await fetch(apiBase, {
            headers: { 'Authorization': `token ${s.token}` }
        });
        if (check.ok) {
            const j = await check.json();
            await fetch(apiBase, {
                method: 'PUT',
                headers: { 'Authorization': `token ${s.token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: 'clear route',
                    content: btoa('{}'),
                    sha: j.sha
                })
            });
        }
    } catch(e) {}

    showStatus('Percorso cancellato', '');
});

// ═══════════════════════════════════════════════
//  WAYPOINTS
// ═══════════════════════════════════════════════
let wpCounter = 0;

document.getElementById('btnAddWp').addEventListener('click', () => {
    addWaypointRow();
});

function addWaypointRow() {
    const id  = ++wpCounter;
    const idx = waypoints.length;
    waypoints.push({ id, coords: null });

    const row = document.createElement('div');
    row.className = 'wp-row';
    row.dataset.wpid = id;
    row.innerHTML = `
        <div class="wp-num">${idx + 1}</div>
        <input class="wp-inp" type="text" placeholder="Tappa ${idx + 1}..." autocomplete="off">
        <div class="wp-sug"></div>
        <button class="wp-del" title="Rimuovi">✕</button>`;

    const inp = row.querySelector('.wp-inp');
    const sug = row.querySelector('.wp-sug');
    const del = row.querySelector('.wp-del');

    // Autocomplete
    let timer;
    inp.addEventListener('input', () => {
        clearTimeout(timer);
        const q = inp.value.trim();
        if (q.length < 3) { sug.classList.remove('show'); return; }
        timer = setTimeout(async () => {
            try {
                const results = await geocode(q);
                sug.innerHTML = '';
                if (!results.length) { sug.classList.remove('show'); return; }
                results.forEach(r => {
                    const d = document.createElement('div');
                    d.className = 'suggestion-item';
                    d.textContent = r.display_name;
                    d.addEventListener('click', () => {
                        inp.value = r.display_name;
                        sug.classList.remove('show');
                        const wp = waypoints.find(w => w.id === id);
                        if (wp) wp.coords = { lat: parseFloat(r.lat), lng: parseFloat(r.lon) };
                        checkReady();
                    });
                    sug.appendChild(d);
                });
                sug.classList.add('show');
            } catch(e) {}
        }, 500);
    });

    document.addEventListener('click', e => {
        if (!e.target.closest('.wp-row')) sug.classList.remove('show');
    });

    // Delete
    del.addEventListener('click', () => {
        waypoints = waypoints.filter(w => w.id !== id);
        row.remove();
        renumberWaypoints();
    });

    document.getElementById('wpList').appendChild(row);
}

function renumberWaypoints() {
    document.querySelectorAll('.wp-row').forEach((row, i) => {
        row.querySelector('.wp-num').textContent = i + 1;
        row.querySelector('.wp-inp').placeholder = `Tappa ${i + 1}...`;
    });
}

// ═══════════════════════════════════════════════
//  SETTINGS MODAL
// ═══════════════════════════════════════════════
document.getElementById('btnSettings').addEventListener('click', () => {
    const s = loadSettings();
    document.getElementById('setToken').value = s.token;
    document.getElementById('setUser').value  = s.user;
    document.getElementById('setRepo').value  = s.repo;
    document.getElementById('settingsModal').classList.add('show');
});
document.getElementById('btnSaveSett').addEventListener('click', () => {
    saveSettings({
        token: document.getElementById('setToken').value.trim(),
        user:  document.getElementById('setUser').value.trim(),
        repo:  document.getElementById('setRepo').value.trim()
    });
    document.getElementById('settingsModal').classList.remove('show');
    showStatus('Impostazioni salvate', 'ok');
});
document.getElementById('btnCancelSett').addEventListener('click', () => {
    document.getElementById('settingsModal').classList.remove('show');
});

// ═══════════════════════════════════════════════
//  STATUS HELPER
// ═══════════════════════════════════════════════
let statusTimer = null;
function showStatus(msg, type) {
    const el = document.getElementById('statusBar');
    el.textContent = msg;
    el.className   = 'show' + (type ? ' ' + type : '');
    if (statusTimer) clearTimeout(statusTimer);
    if (type === 'ok' || type === 'err') {
        statusTimer = setTimeout(hideStatus, 3000);
    }
}
function hideStatus() {
    document.getElementById('statusBar').className = '';
}
</script>
